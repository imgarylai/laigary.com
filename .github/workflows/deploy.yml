name: deploy

# Deploys the TanStack Start worker to Cloudflare via Alchemy.
# Trigger manually (workflow_dispatch) to confirm the pipeline, or on push to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Workers Scripts:Edit + Workers KV Storage:Edit (for the
#                            Alchemy state worker) + Account Settings:Read. Reused below
#                            as ALCHEMY_STATE_TOKEN, so no separate state-store secret.
#   CLOUDFLARE_ACCOUNT_ID  — target account id
# Tip: `pnpm exec alchemy util create-cloudflare-token` mints a token with the right scopes.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: alchemy deploy
        run: pnpm exec alchemy deploy --stage prod
        env:
          CI: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Reuse the deploy token for the Alchemy CloudflareStateStore.
          ALCHEMY_STATE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
