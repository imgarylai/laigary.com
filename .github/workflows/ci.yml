name: CI

# check (lint / format / test / build) runs on every PR and on push to main and
# gates the deploy. deploy (alchemy → Cloudflare Workers) only runs after check
# passes, on push to main or a manual dispatch.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Workers Scripts:Edit + Workers KV Storage:Edit (for the
#                            Alchemy state worker) + Account Settings:Read + the
#                            Access/Zone/D1/R2 scopes Alchemy provisions.
#   CLOUDFLARE_ACCOUNT_ID  — target account id.
#   ALCHEMY_STATE_TOKEN    — the account-wide Alchemy state-store token (same value
#                            across every Alchemy project so they share the one
#                            `alchemy-state-service` worker).
#   R2_ACCESS_KEY_ID       — R2 S3 API access key id (for presigned uploads, #28).
#   R2_SECRET_ACCESS_KEY   — R2 S3 API secret access key.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 24

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: pnpm lint
          - name: Format
            command: pnpm format:check
          - name: Test
            command: pnpm test
          - name: Build
            command: pnpm build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ${{ matrix.command }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [check]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: alchemy deploy
        run: pnpm exec alchemy deploy --stage prod
        env:
          CI: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          # R2 S3 presign credentials, baked into the worker via alchemy.secret (#28).
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
